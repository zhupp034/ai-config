version: 1
display_name: 禅道任务处理
short_description: 登录禅道后批量建任务、更新任务，或按 git 提交自动完成匹配任务
default_prompt: Use $zentao-task-batch-create to log into the local ZenTao site with account/password, then create or update ZenTao tasks, or compare pending ZenTao tasks with real git commits under the local gitlab directory and finish the matched tasks on the corresponding commit date.
